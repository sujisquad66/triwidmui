openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: videos
    description: YouTube video listing
  - name: stories
    description: Horror story listing
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /videos:
    get:
      operationId: listVideos
      tags: [videos]
      summary: List channel videos
      description: Returns a paginated list of videos from the Triwid mui YouTube channel
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 12
      responses:
        "200":
          description: Paginated video list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoListResponse"
  /stories:
    get:
      operationId: listStories
      tags: [stories]
      summary: List horror stories by language
      description: Returns the latest stories for the given language from the configured source
      parameters:
        - name: lang
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/StoryLanguage"
      responses:
        "200":
          description: Story list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryListResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    StoryLanguage:
      type: string
      enum: [id, en, ja]
    VideoItem:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        thumbnailUrl:
          type: string
        publishedAt:
          type: string
        url:
          type: string
      required:
        - id
        - title
        - thumbnailUrl
        - publishedAt
        - url
    VideoListResponse:
      type: object
      properties:
        videos:
          type: array
          items:
            $ref: "#/components/schemas/VideoItem"
        page:
          type: integer
        pageSize:
          type: integer
        totalItems:
          type: integer
        totalPages:
          type: integer
      required:
        - videos
        - page
        - pageSize
        - totalItems
        - totalPages
    StoryItem:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        excerpt:
          type: string
        coverImage:
          type: string
        link:
          type: string
        publishedAt:
          type: string
        source:
          type: string
      required:
        - id
        - title
        - excerpt
        - coverImage
        - link
        - publishedAt
        - source
    StoryListResponse:
      type: object
      properties:
        stories:
          type: array
          items:
            $ref: "#/components/schemas/StoryItem"
        lang:
          $ref: "#/components/schemas/StoryLanguage"
        available:
          type: boolean
      required:
        - stories
        - lang
        - available
